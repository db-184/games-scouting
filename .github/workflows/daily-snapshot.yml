name: Daily snapshot

on:
  schedule:
    # 03:00 IST = 21:30 UTC (previous day)
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: snapshot
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm install

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily snapshot
        env:
          CI: "true"
        run: python -m src.jobs.daily

      - name: Commit DB + logs
        run: |
          git config user.name  "games-scouting-bot"
          git config user.email "games-scouting-bot@users.noreply.github.com"
          git add data/ logs/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(snapshot): $(date -u +%Y-%m-%d) daily chart snapshot"
            git push
          else
            echo "No changes to commit."
          fi
