        \"currency\":\"USD\", \n\"description\":\"Dive into an open world of building,
        crafting and survival. Gather resources, survive the night, and build whatever
        you can imagine one block at a time. Explore and craft your way through a
        completely open world where you can play with friends, build a city, start
        a farm, mine deep into the ground, face mysterious enemies, or just experiment
        to the limits of your imagination! \\n \\nThe possibilities are endless. Embark
        on an epic adventure and play with friends, building from the ground up. Build
        and expand in Creative mode, where you can craft from unlimited resources.
        Survive the night, face intense battles, craft tools, and fend off danger
        in Survival mode. With seamless cross-platform and multiplayer gameplay on
        Minecraft: Bedrock Edition, you can adventure solo or with friends, and discover
        an infinite, randomly generated world filled with blocks to mine, biomes to
        explore, and mobs to befriend (or battle)!  \\n \\nIn Minecraft, the world
        is yours to shape! \\n \\nCREATE YOUR WORLD \\n\u2022 Build anything from
        the ground up \\n\u2022 Craft from special resources and tools to create brand
        new structures and landscapes \\n\u2022 Explore an endless open world full
        of different biomes and creatures \\n\u2022 Minecraft Marketplace \u2013 Get
        creator-made add-ons, thrilling worlds, and stylish cosmetics on Minecraft
        Marketplace \\n\u2022 Connect with millions of players on community servers,
        or subscribe to Realms Plus to cross-play with up to 10 friends on your own
        private server \\n\u2022 Slash commands \u2013 Tweak how the game plays: you
        can change the weather, summon mobs, change the time of day, and more \\n\u2022
        Add-ons \u2013 Customize your experience even further with add-ons! If you're
        more tech-inclined, you can modify your game to create new resource packs
        \\n \\nMULTIPLAYER ONLINE GAMES \\n\u2022 Join free massive multiplayer servers
        and play with thousands of others \\n\u2022 Multiplayer servers allow you
        to play with up to 4 players online with a free Xbox Live account \\n\u2022
        Build, battle and explore other realms. With Realms and Realms Plus, you can
        play with up to 10 friends cross-platform, anytime, anywhere on Realms, your
        own private server that we host for you \\n\u2022 With Realms Plus, get instant
        access to over 150 Marketplace items with new additions each month. Share
        with friends on your own private Realms server*  \\n\u2022 Connect and play
        with players across the world, wherever they are, and join in on MMO battles
        for survival in other worlds \\n\u2022 Discover gigantic community-run worlds,
        compete in unique mini-games and socialize in lobbies full of fellow Minecrafters
        \\n \\nSUPPORT: https://www.minecraft.net/help \\nLEARN MORE: https://www.minecraft.net/
        \\n\\nHere are the links to our Privacy Policy and Terms and Conditions:\\nPrivacy
        Policy: https://www.minecraft.net/privacy/gdpr\\nTerms and Conditions: https://account.mojang.com/terms\\n
        \\nMINIMUM RECOMMENDED SPECIFICATION \\n \\nTo check the requirements for
        your device visit: https://help.minecraft.net/hc/en-us/articles/4409172223501
        \\n \\n*Realms & Realms Plus: Try a free 30-day trial in-app. \\n\\nMinecraft
