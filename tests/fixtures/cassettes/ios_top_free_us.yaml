        to download, the app offers new puzzles daily for every skill level. \\n\\nApp
        Features and Games:\\n\\nNEW: THE MIDI CROSSWORD\\n- Crush this clever midsize
        word puzzle.\\n- Just-right size between the Mini and the Crossword.\\n- Enjoy
        approachable clues, special puzzles and a path to daily wins.\\n\\nTHE CROSSWORD\\n-
        The classic daily New York Times puzzle you love.\\n- Crack clues and fill
        the grid with answers.\\n- Crosswords increase in difficulty throughout the
        week.\\n\\nWORDLE\\n- The official Wordle, a word-guessing game. \\n- Can
        you guess the 5-letter word in 6 tries or less?\\n- Analyze your guesses and
        improve your skills with Wordle Bot.\\n\\nCONNECTIONS\\n- Group words that
        share a common thread.\\n- Organize 16 terms into four categories using word
        associations and strategy in this brain teaser\\n- Analyze your guesses and
        see how you stack up with Connections Bot.\\n\\nSPELLING BEE\\n- Is spelling
        your strong suit?\\n- See how many words you can create with 7 letters.\\n-
        Build more words to earn more points.\\n\\nSUDOKU\\n- Looking for a numbers
        game, minus the math?\\n- Fill each 3x3 set of boxes with numbers 1 to 9.\\n-
        Play a new puzzle every day in easy, medium or hard mode.\\n\\nSTRANDS\\n-
        Try this classic word search, with a twist.\\n- Find hidden words and uncover
        the day\u2019s theme.\\n- How many words can you find?\\n\\nTHE MINI CROSSWORD\\n-
        All the fun of the Crossword, but you can solve it in seconds.\\n- A spin
        on our original word game, with simpler clues.\\n- Puzzles don\u2019t increase
        in difficulty throughout the week.\\n\\nPIPS\\n- Find the right spot for each
        domino.\\n- Leverage logic and arrange dominoes in this brain teaser.\\n-
        Play three puzzles daily: Easy, medium and hard.\\n\\nTILES\\n- Unwind with
        a pattern-matching game.\\n- The key is to match elements consecutively.\\n-
        Can you keep your chain going?\\n\\nLETTER BOXED\\n- Build words using letters
        around the square.\\n- Test your word-making skills with daily puzzles.\\n-
        Connect characters and see how many words you can create.\\n\\nBADGES\\n-
