        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Fast paced
        3v3 & 5v5 MOBA and Battle Royale made for mobile! Play online with friends
        or solo across a variety of PvP arena game modes in under three minutes.\\n\\n\\nUnlock
