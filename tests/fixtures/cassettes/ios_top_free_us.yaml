        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Step right
        up and test your brain in the most colorful 3D puzzle adventure!\\n\\nJoin
        the Carnival Crew and dive into a vibrant world packed with fun, challenge,
        and satisfying matching gameplay. Can you spot and match all the hidden objects
        before time runs out?\\n\\nTest Your Brain\\n\\nSharpen your focus as you
        search, sort, and match tons of 3D objects in dynamic piles. It\u2019s easy
        to learn\u2014but tricky to master!\\n\\nHow to Play\\n\\n\u2022 Tap to match
        2 identical 3D objects\\n\u2022 Clear the board before the timer runs out\\n\u2022
        Unlock new levels and challenges as you progress\\n\u2022 Use powerful boosters
        to help when things get tough\\n\\nFeatures\\n\\n\u2022 Hundreds of fun levels
        with increasing difficulty\\n\u2022 Bright, colorful carnival-themed visuals\\n\u2022
        Satisfying and relaxing match mechanics\\n\u2022 Unique objects to discover
        in every level\\n\u2022 Handy boosters & power-ups to keep you moving\\n\\nWhy
        You\u2019ll Love It\\n\\nWhether you\u2019re looking to relax or challenge
        your mind, Match3D: Carnival Crew delivers a perfect mix of fun and focus.
        Every level feels fresh, rewarding, and just a little bit addictive.\\n\\nReady
        to join the crew?\\nDownload now and start matching your way through the carnival!\"},
