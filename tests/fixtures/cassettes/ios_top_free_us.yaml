        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Yarn Loop
        is a relaxing and satisfying puzzle game featuring colorful yarn bobbins and
        knitted patterns.\\n\\nBobbins move onto the conveyor and collect stitches
        of their own color. Each bobbin has a capacity value that decreases as stitches
        are picked up. When its capacity reaches zero, the bobbin disappears. If capacity
        remains, the bobbin is transferred to the rack and can be used again later.\\n
        \\nComplete each knitted pattern by using the right bobbins in the right order.\\n\\nGame
        Features\\n\u25BA Simple One-Tap Gameplay: Bobbins move smoothly through the
        conveyor system and collect matching stitches with ease.\\n\u25BA Color-Based
        Collection Mechanic: Each bobbin clears only the stitches of its own color.\\n\u25BA
        Capacity Management System: Every bobbin has a limited pickup value, creating
        thoughtful and satisfying puzzle decisions.\\n\u25BA Rack Reuse Function:
        Bobbins that still have capacity return to the rack and remain available for
        later use.\\n\u25BA Hundreds of Engaging Levels: New knitted layouts, color
        combinations, and puzzle arrangements appear throughout progression.\\n\u25BA
        Cozy Yarn Aesthetic: Soft textures, warm colors, and pleasant animations create
        a calm and enjoyable experience.\\n\\nYarn Loop offers a smooth, calm, and
        visually charming journey through handcrafted yarn puzzles.\"}, \"im:price\":{\"label\":\"Get\",
