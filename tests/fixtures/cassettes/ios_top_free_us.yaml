        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Kingshot is
        an innovative idle medieval survival game that combines strategic gameplay
        with rich details waiting to be explored.\\n\\nWhen a sudden rebellion overturns
        the fate of an entire dynasty and ignites a devastating war, countless people
        lose their homes. In a world riddled with societal collapse, rebel invasions,
        rampant disease, and mobs desperate for resources, survival is the ultimate
        challenge. As a governor in these turbulent times, it's up to you to lead
        your people through these adversities, devising internal and diplomatic strategies
        to rekindle the spark of civilization.\\n\\n[Core Features]\\n\\nDefend Against
        Invasions\\nStay vigilant and ready to repel invasions at any moment. Your
        town, the last bastion of hope, depends on it. Gather resources, upgrade your
        defenses, and prepare for battle to ensure survival in these tough times.\\n\\nManage
        Human Resources\\nEnjoy a unique gameplay mechanic involving the allocation
        of survivor roles such as workers, hunters, and chefs. Monitor their health
        and happiness to ensure they remain productive. Respond quickly to illness
        to make sure everyone receives timely treatment.\\n\\nEstablish Laws\\nCodes
        of law are vital for sustaining civilization and are crucial for the growth
        and strength of your town.\\n\\n[Strategic Gameplay]\\n\\nResource Struggle\\nAmidst
        the sudden state collapse, the continent is flooded with untapped resources.
        Refugees, rebels, and power-hungry governors are all eyeing these precious
        materials. Ready yourself for battle and use every strategy at your disposal
        to secure these resources!\\n\\nBattle for Power\\nCompete against other players
        for the ultimate honor of becoming the strongest governor in this grand strategy
        game. Claim the throne and reign supreme!\\n\\nForge Alliances\\nEase the
        burden of survival in this chaotic world by forming or joining alliances.
        Collaborate with allies to rebuild civilization!\\n\\nRecruit Heroes\\nThe
        game features a roster of unique heroes, each waiting to be recruited. Bringing
        together heroes with various talents and skills is essential for taking the
        initiative and ensuring safety in these desperate times.\\n\\nCompete with
        Other Governors\\nHone your heroes' skills, assemble your squads, and challenge
        other governors. Victory not only earns you valuable points, but also grants
        access to rare items. Lead your town to the top of the rankings and showcase
        the rise of a great civilization.\\n\\nAdvance Technology\\nWith the rebellion
        obliterating almost all technological advancements, it's crucial to start
        rebuilding and reclaiming the fragments of lost tech. The race to master cutting-edge
        technology could determine the dominator of this new world order!\\n\\n[Stay
        Connected]\\nDiscord: https://discord.com/invite/5cYPN24ftf\"}, \"im:price\":{\"label\":\"Get\",
