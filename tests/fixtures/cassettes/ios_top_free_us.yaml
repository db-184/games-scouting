        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"You're going
        to download this. Let's not overthink it.\\n\\nTwo doors. You pick one. You
        live or you die. That's the whole game, yes, really. \\n\\nNo skill trees.
        No crafting. One mechanic, one choice, and The Corridor is already tired of
        you.\\n\\nFeatures, since you're still reading:\\n\\n- One choice. That's
        the whole mechanic. You're still going to get it wrong.\\n- No tutorials.
        No hand-holding. A small amount of sympathy, withdrawn without notice.\\n-
        The Corridor has feelings about your decisions, and none of them are positive.\\n-
        Streaks that make you feel invincible approximately two seconds before you're
        not.\\n- Clues and props that are genuinely helpful, which somehow makes it
        worse when you ignore them and die.\\n- Achievements, collectibles, and a
        progression system called \\\"Condolences\\\". You're going to need them.\\n-
        Game Center integrated leaderboards, challenges, and achievements because
        The Corridor doesn't play favorites. It just keeps score.\\n\\nFree to play.
        No paywalls. No battle pass. No premium cosmetic DLC. The only cost is your
        time, your sanity, and the slow realization that you could be doing literally
        anything else right now \u2014 but instead you're here, telling yourself \\\"one
        more round\\\" for the ninth time.\\n\\nWe're not judging you. The Corridor
        is. But we're not. We promise.\"}, \"im:price\":{\"label\":\"Get\", \"attributes\":{\"amount\":\"0.00\",
