        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Mahjong Blast
        is an original offline mahjong tile matching puzzle game, crafted exclusively
        for players of all ages who prefer internet-free gaming with no WiFi required.
        Play this offline game anytime, anywhere \u2014 no WiFi needed, no data connection
        required, and no constant online dependency, with no ads and no pop-ups interrupting
        your mahjong experience.\\n\\nBuilt around clear layouts and intuitive rules,
        Mahjong Blast blends classic mahjong tile logic with smooth tile matching
        design. Match identical mahjong tiles, plan each move, and clear structured
        boards at a calm, steady pace. Whether you enjoy match-2 mahjong connect styles
        or match-3 tile gameplay, this offline puzzle game lets you find your rhythm
        without interruptions.\\n\\nTile Match Puzzle Gameplay\\nAt its core, Mahjong
        Blast is an offline puzzle game focused on thoughtful tile matching. Open
        paths, remove pairs step by step, and progress steadily using logic and observation.
        Without timers or forced speed, this offline mahjong experience supports relaxed,
        focused play wherever you are.\\n\\nZen Match & Relaxing Offline Experience\\nDesigned
        with a calm zen flow, this offline game delivers smooth, distraction-free
        gameplay. Soft visuals and structured boards help players unwind while enjoying
        consistent tile matching without needing WiFi or internet access.\\n\\nFully
        Offline Mahjong Puzzle for Adults & Seniors\\nThis mahjong puzzle game runs
        completely offline. It is one of those offline games that work reliably during
        travel, flights, or quiet moments at home. No WiFi, no mobile data, no interruptions
        \u2014 just steady mahjong tile matching in a stable offline environment.
        Built for adults and seniors, it combines classic mahjong solitaire foundations
        with structured tile match progression in a clear, easy-to-read format.\\n\\nAd-Free
        Mahjong No Interruptions\\nMahjong Blast is one of the no ads games designed
        for uninterrupted play. There are no pop-ups and no forced video ads, so every
        tile match flows smoothly from start to finish. Combined with offline support,
        it delivers focused mahjong gameplay without distractions.\\n\\nClassic Mahjong
        Solitaire\\nInspired by classic mahjong solitaire layouts, the game preserves
        traditional board structures while adapting them into a modern offline puzzle
        game format. Fans of mahjong solitaire will recognize the logic instantly,
        now supported by a fully offline system that lets you play without internet
        anytime.\\n\\nMahjong Blast, formerly known as Mahjong Wonders, brings together
        classic mahjong solitaire and a powerful offline game structure. If you\u2019re
        looking for offline games that truly work without WiFi, this mahjong puzzle
        delivers reliable tile matching anytime \u2014 at home, on the go, or anywhere
        without internet, all within a smooth ad-free environment designed for uninterrupted
        play.\"}, \"im:price\":{\"label\":\"Get\", \"attributes\":{\"amount\":\"0.00\",
