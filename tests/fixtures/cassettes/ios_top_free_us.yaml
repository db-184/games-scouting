        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Playing Zen
        Word 10 minutes a day brings you incredible challenging and relaxing experiences.\\n
        \\nZen word is a challenging word game & brain game that helps to train your
        brain and sharpen your mind. Zen Word is much more challenging than most other
        word puzzle games. Unlike crossword puzzles games or word cross games or word
        scramble games, all words in Zen Word are uncrossed, without any logical connection
        that can give you hints to help you solve the puzzles.  In Zen Word, you need
        to search and connect the right letters to find 20 hidden words on average
        in each level to test your vocabulary. The length of the words is the only
        clue that will help you find all the words and solve the puzzles. Therefore,
        Zen Word has very high requirements for your vocabulary and spelling skills.
        All word puzzles in Zen Word are carefully designed and will definitely give
        you a completely different challenging experience. \\n\\nAlso, Zen Word is
        very different from word-search games. In word search games, your objective
        is to find and mark all the words hidden inside the letters box. The arrangement
        of these words in word-search games has clear rules, even if you don't know
        the spelling of the words, you can still search and find all the hidden words
        to solve the puzzles. As you find more words, the difficulty of word search
        games gets easier. However in Zen Word, as you find more words, the difficulty
        of the game will increase sharply. The rest of the words are extremely hard
        for you to remember and to spell. In the process of recalling words, you can
        make your brain sharper. Zen word is a word game for adults to train their
        brains. \\n \\nIn addition to bringing you a super challenging experience,
        Zen Word can also bring you the best relaxing and calm experience.In some
        crossword puzzles or some word search games or word finder games, you must
        find all words in limited time, giving you a lot of pressure. Also, in word
        scramble games, you need to score more points than your friends to win and
        can not enjoy the word puzzle solving process. In Zen Word, there is no countdown,
        no competition or any other designs that make you anxious or interrupt your
        puzzle solving experience. You can fully immerse yourself in word puzzles,
        accompanied by beautiful and peaceful nature backgrounds and peaceful music.
        All the backgrounds and music are carefully selected in the style of zen.
        You can dissipate worries, relieve stress, and relax your mind with Zen Word.\\n\\nHere
