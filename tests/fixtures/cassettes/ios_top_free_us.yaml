        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Conveyor\u2019s
        ready, pigs are on standby. Tap to send a pig onto the conveyor so it rains
        balls onto pixel cubes of its own color. The number above its head is its
        ammo: that\u2019s how many hits it makes. Run out and it leaves the stage;
        if not, it slips into one of the 5 waiting slots and, when you tap again,
        it jumps back on the conveyor to fire another round.\\r\\nThe conveyor has
        a capacity\u2014push past the limit and you\u2019ll need to wait. Send them
        in the right order, manage the flow, and hit the cubes to clear the board
        piece by piece. Simple mechanic, sticky loop: tap \u2192 flow \u2192 repeat.\\r\\nHighlights\\r\\nOne-tap
        control: Quick sessions, easy one-handed play.\\r\\nColor matching: Pigs only
        hit their own color\u2014no target-picking hassle.\\r\\nConveyor capacity:
        Timing and queue management add a bite-size strategy layer.\\r\\n5 waiting
        slots: Stack, sort, and launch at the perfect moment.\\r\\nShort but \u201Cone
        more round\u201D feel: Perfect for micro-breaks.\\r\\nSatisfying pixel cleanup:
        Every hit leaves the board feeling crisp.\\r\\nFor anyone who loves fast action-puzzles,
        timing, and flow management. The pigs are ready. The cubes\u2026 not so much.\"},
