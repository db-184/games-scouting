        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"Dive into
        Marble Sort, the ultimate 3D physics puzzle that will test your logic, timing,
        and strategy!\\n\\nIn this vibrant and satisfying brain teaser, your goal
        is to sort falling marbles into their perfectly matched colored boxes. But
        there's a catch! Between the trays and the boxes lies a continuously moving
        circular conveyor belt.\\n\\nTap a tray to release the marbles and watch them
        drop with realistic physics onto the conveyor. As they travel around, they'll
        drop into the matching colored boxes at the bottom. Fill all 3 slots in a
        box to clear it! Be careful\u2014if marbles get stuck on the conveyor with
        no matching boxes available, it's game over.\\n\\nWhy You'll Love Marble Sort:\\n\\n-Dynamic
        Puzzle Mechanics: A unique blend of physics-based dropping and conveyor-belt
        strategy.\\n-Satisfying Gameplay: The perfect mix of relaxing ASMR-style marble
        clinking and challenging brain-training.\\n-Hundreds of Levels: Endless fun
        that scales in difficulty to keep your mind sharp!\\n-Play Offline: Perfect
        for your commute. Enjoy the full game without WiFi or data.\\n- Easy to Learn,
        Hard to Master: One-tap controls make it easy to play anywhere, anytime!\\n\\nStrategize
        your drops, clear the conveyor, and become the ultimate sorting master.\\n\\nDownload
        Marble Sort today and let the fun roll!\"}, \"im:price\":{\"label\":\"Get\",
