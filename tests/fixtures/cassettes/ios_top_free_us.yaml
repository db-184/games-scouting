        \"attributes\":{\"height\":\"100\"}}], \"summary\":{\"label\":\"HIGHWAY RACER
        PRO - The most realistic highway traffic racing game on mobile\\nPush your
        limits in the ultimate car racing game. Experience high-speed action on real
        highways, dodge through dense traffic, and become the king of the road.\\n\\nDOMINATE
        THE HIGHWAY WITH REAL CARS\\nJump into your dream car and hit the highway.
        With real car physics and ultra-detailed vehicles, every race feels extreme.
        Whether you\u2019re driving a muscle car or a tuner, the traffic is your playground.\\n\\nREAL
        HIGHWAYS, REAL TRAFFIC\\nRace through real highways inspired by Japan, Germany,
        Brazil, and the USA. Overtake in rush hour traffic, slide through narrow lanes,
        and feel the rush of pure highway traffic.\\n\\nONLINE MULTIPLAYER RACING\\nDrive
        with your friends or take on rivals from around the world in online multiplayer
        racing. Every overtake, every second, every decision matters in this real-time
        car battle.\\n\\nDYNAMIC WEATHERS ACROSS CITY AND HIGHWAYS\\nFrom rainy city
        nights to bright highway mornings, each environment tests your skills. Drive
        through traffic under snow, fog, rain or clear skies\u2014just like in the
        real world.\\n\\nFULL CAR CUSTOMIZATION\\nUpgrade and personalize your car
        with body kits, paint jobs, rims, and more. Build your signature look and
        take your machine to the top of the racing scene.\\n\\nMULTIPLE GAME MODES
        TO MASTER\\nEnjoy quick 1v1 showdowns, intense score hunts, and high-pressure
        time races. Each mode pushes your driving skills and reflexes to the edge.\\n\\nHighway
        Racer Pro delivers the most realistic traffic highway racing experience ever
        built for mobile. It\u2019s time to overtake, dominate the highway, and show
        the world your car belongs at the top.\\nDownload Highway Racer Pro for free
        now.\"}, \"im:price\":{\"label\":\"Get\", \"attributes\":{\"amount\":\"0.00\",
