        \\n\\n\\n\u25B6 Brawl Ball (3v3,5v5): It's a whole new brawl game! Show off
        your soccer/football skills and score two goals before the other team. There
        are no red cards here.\\n\\n\\n\u25B6 Bounty (3v3,5v5): Battle to take out
        opponents and earn stars, but don\u2019t let them pick you off. The squad
        with the most stars wins the match!\\n\\n\\n\u25B6 Heist (3v3,5v5): Protect
        your team\u2019s safety and try to crack open your opponents\u2019. Navigate
        the arena to sneak, blast, battle and blow your way clear to the enemies treasure.\\n\\n\\n\u25B6
        Special MOBA Events: Limited time special MOBA PvE and PvP arena battle game
        modes.\\n\\n\\n\u25B6 Championship Challenge: Join Brawl Stars' esports scene
        with in-game qualifiers!\\n\\n\\n\\n\\n\u25C9 UNLOCK AND UPGRADE BRAWLERS:\\n\\n\\nCollect
        and upgrade a variety of Brawlers with powerful super abilities, star powers
        and gadgets! Level them up and collect unique skin.\\nA fast paced battle
        royale MOBA made for mobile. Unlock and collect new, powerful \\\"brawlers\\\",
        each with a signature attack and super ability.\\n\\n\\n\\n\u25C9 BRAWL PASS:\\n\\n\\nComplete
