        member of your team can unleash their own powerful ultimate ability to smash
        and/or rip the enemy to a pulp and/or shreds and claim victory.\\n\\nIDLE
        BATTLE & GDA OPS\\nRun idle battles in the background while you\u2019re AFK
        living your everyday life. Even better, accumulate tons of rewards to collect
        when you\u2019re back!\\nGet more out of your team, send them on GDA Ops:
        secondary battle that runs separate from the main storyline, played simultaneously.\\n\\nALLIANCES
        WITH FRIENDS\\nTeam up with friends to deploy a group of heroes co-op. Prepare
        for social battle together, facing waves of Magmanites, Reanimen and Flaxans
        popping up, dropping down, or portal-ing themselves in from other dimensions.\\n\\nGEAR
        & ARTIFACTS\\nAlways good to have a little extra padding! Send your team into
        battle fully equipped with four categories of gear: chestwear, legwear, footwear
        and gloves. \\nAdd special, unique gear known as artifacts for extra stat
        bonuses or passive effects. \\nEach piece of gear has a rarity level and can
        be upgraded to enhance its benefit even further.\\n\\nSHOPS, NOT LOOTBOXES\\nThere\u2019s
        a mall\u2019s-worth of different stores to check out. Recruit heroes, acquire
        gear, currencies and more! Pop into Cecil\u2019s Recruitment Department to
        get new heroes. Or visit Art\u2019s Tailor Shoppe to purchase equipment and
        other items of interest. \\nThis is no casino: get what you want in transparent
        shops without frustrating gacha mechanics or lootbox systems.\\n\\nMISSIONS
        & EVENTS \\nMore action to keep you on your toes - complete daily and weekly
        goals for huge in-game rewards, with frequent special offers, unique in-game
        events, and more to come. Each month a new character from the Invincible universe
        will be revealed and available to recruit for your team.\\n\\nVisit us on:
